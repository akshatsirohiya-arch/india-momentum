name: Full India Market Scan
on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run Scanner
        run: python generate_watchlist.py # <--- ENSURE FILENAME IS EXACTLY THIS

      - name: Commit Data
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@nse.com"
          git add daily_watchlist.csv
          git commit -m "Full NSE Update" || echo "No changes to commit"
          git push
