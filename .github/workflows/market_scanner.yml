name: Full India Market Scan
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        # Added --retries and --no-cache-dir to prevent SSL corruption
        run: |
          python -m pip install --upgrade pip
          pip install --retries 10 --no-cache-dir yfinance pandas numpy requests
      - name: Scan
        run: python generate_watchlist.py
      - name: Push
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@nse.com"
          git add daily_watchlist.csv
          git commit -m "Full Market Scan $(date)" || exit 0
          git push
