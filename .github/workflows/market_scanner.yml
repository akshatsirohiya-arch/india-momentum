name: Full India Market Scan
on:
  schedule:
    - cron: '0 13 * * *' # 6:30 PM IST
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Scan
        run: |
          pip install yfinance pandas numpy requests
          python generate_watchlist.py
      - name: Push
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@nse.com"
          git add daily_watchlist.csv
          git commit -m "Full Market Scan $(date)" || exit 0
          git push
