name: Full India Market Scan
on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly grant write access
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Scanner
        run: |
          pip install yfinance pandas numpy requests
          python generate_watchlist.py

      - name: Commit and Push
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@nse.com"
          git add daily_watchlist.csv
          git commit -m "Update NSE Watchlist $(date)" || echo "No changes"
          git push
