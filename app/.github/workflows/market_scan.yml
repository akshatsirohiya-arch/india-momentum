name: Market-Wide Momentum Scan
on:
  schedule:
    - cron: '0 13 * * *' # 6:30 PM IST (Market close + 3 hours)
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}
      - name: Install & Run
        run: |
          pip install yfinance pandas numpy requests
          python generate_watchlist.py
      - name: Push CSV
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@market.com"
          git add daily_watchlist.csv
          git commit -m "Full Market Scan $(date)"
          git push
